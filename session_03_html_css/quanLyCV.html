<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản Lý Công Việc</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  .task-done .task-title { text-decoration: line-through; color: #6c757d; }
  .priority-cao    { border-left: 4px solid #dc3545; }
  .priority-trung  { border-left: 4px solid #ffc107; }
  .priority-thap   { border-left: 4px solid #198754; }
</style>
</head>
<body class="bg-light">

<div class="container py-4">

  <!-- Tiêu đề -->
  <h2 class="mb-4">📋 Quản Lý Công Việc Cá Nhân</h2>

  <!-- Thống kê -->
  <div class="row mb-3" id="khu-vuc-thong-ke">
    <div class="col-auto">
      <span class="badge bg-secondary fs-6">Tổng: <strong id="stat-tong">0</strong></span>
    </div>
    <div class="col-auto">
      <span class="badge bg-success fs-6">Hoàn thành: <strong id="stat-xong">0</strong></span>
    </div>
    <div class="col-auto">
      <span class="badge bg-warning text-dark fs-6">Chưa xong: <strong id="stat-chua">0</strong></span>
    </div>
  </div>

  <!-- Thông báo -->
  <div id="thong-bao" class="alert d-none"></div>

  <!-- Nút thêm -->
  <div class="mb-3">
    <button class="btn btn-primary" id="btn-mo-form">+ Thêm Công Việc</button>
  </div>

  <!-- Danh sách công việc -->
  <div id="danh-sach"></div>

</div>

<!-- Modal thêm/sửa -->
<div class="modal fade" id="modal-form" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modal-tieu-de">Thêm Công Việc</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Tiêu đề <span class="text-danger">*</span></label>
          <input type="text" id="f-title" class="form-control" placeholder="Tên công việc">
        </div>
        <div class="mb-3">
          <label class="form-label">Mô tả ngắn</label>
          <textarea id="f-desc" class="form-control" rows="2" placeholder="Mô tả..."></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label">Hạn hoàn thành</label>
          <input type="date" id="f-deadline" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label">Mức ưu tiên</label>
          <select id="f-priority" class="form-select">
            <option value="cao">Cao</option>
            <option value="trung" selected>Trung bình</option>
            <option value="thap">Thấp</option>
          </select>
        </div>
        <input type="hidden" id="f-edit-index" value="-1">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
        <button class="btn btn-primary" id="btn-luu">Lưu</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ── DỮ LIỆU ──
const STORAGE_KEY = 'danh_sach_cong_viec';
let tasks = [];
const modalEl = document.getElementById('modal-form');
const bsModal = new bootstrap.Modal(modalEl);

// ── LOAD / SAVE localStorage ──
function loadTasks() {
  const raw = localStorage.getItem(STORAGE_KEY);
  tasks = raw ? JSON.parse(raw) : [
    { title: 'Ôn tập Toán rời rạc', desc: 'Chương 3 và 4', deadline: '2025-06-10', priority: 'cao',   done: false },
    { title: 'Nộp bài tập lớn',     desc: 'Môn CNPM',      deadline: '2025-06-15', priority: 'trung', done: false },
    { title: 'Đọc sách lập trình',  desc: 'Clean Code',    deadline: '',           priority: 'thap',  done: true  },
  ];
  if (!raw) saveTasks();
}

function saveTasks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

// ── HIỂN THỊ DANH SÁCH ──
function renderTasks() {
  const wrap = document.getElementById('danh-sach');
  if (tasks.length === 0) {
    wrap.innerHTML = '<p class="text-muted">Chưa có công việc nào.</p>';
    return;
  }

  wrap.innerHTML = tasks.map((t, idx) => `
    <div class="card mb-2 priority-${t.priority} ${t.done ? 'task-done' : ''}">
      <div class="card-body d-flex justify-content-between align-items-start">
        <div>
          <h6 class="card-title task-title mb-1">${t.title}</h6>
          ${t.desc ? `<p class="card-text text-muted small mb-1">${t.desc}</p>` : ''}
          <small class="text-muted">
            ${t.deadline ? '📅 ' + new Date(t.deadline).toLocaleDateString('vi-VN') + ' &nbsp;' : ''}
            🏷️ Ưu tiên: ${t.priority === 'cao' ? 'Cao' : t.priority === 'trung' ? 'Trung bình' : 'Thấp'}
          </small>
        </div>
        <div class="d-flex gap-2 flex-shrink-0 ms-3">
          <button class="btn btn-sm ${t.done ? 'btn-secondary' : 'btn-success'}"
                  onclick="doiTrangThai(${idx})">
            ${t.done ? '↩ Chưa xong' : '✓ Xong'}
          </button>
          <button class="btn btn-warning btn-sm" onclick="moFormSua(${idx})">Sửa</button>
          <button class="btn btn-danger btn-sm" onclick="xoaCongViec(${idx})">Xóa</button>
        </div>
      </div>
    </div>
  `).join('');
}

// ── THỐNG KÊ ──
function updateTaskSummary() {
  const tong = tasks.length;
  const xong = tasks.filter(t => t.done).length;
  document.getElementById('stat-tong').textContent = tong;
  document.getElementById('stat-xong').textContent = xong;
  document.getElementById('stat-chua').textContent = tong - xong;
}

// ── THÔNG BÁO ──
function showMessage(msg, type = 'success') {
  const el = document.getElementById('thong-bao');
  el.className = `alert alert-${type}`;
  el.textContent = msg;
  el.classList.remove('d-none');
  setTimeout(() => el.classList.add('d-none'), 3000);
}

// ── RESET FORM ──
function resetForm() {
  document.getElementById('f-title').value    = '';
  document.getElementById('f-desc').value     = '';
  document.getElementById('f-deadline').value = '';
  document.getElementById('f-priority').value = 'trung';
  document.getElementById('f-edit-index').value = '-1';
  document.getElementById('modal-tieu-de').textContent = 'Thêm Công Việc';
  document.getElementById('btn-luu').textContent = 'Lưu';
}

// ── LẤY DỮ LIỆU FORM ──
function getFormData() {
  return {
    title:    document.getElementById('f-title').value.trim(),
    desc:     document.getElementById('f-desc').value.trim(),
    deadline: document.getElementById('f-deadline').value,
    priority: document.getElementById('f-priority').value,
    done:     false,
  };
}

// ── MỞ FORM SỬA ──
function moFormSua(idx) {
  const t = tasks[idx];
  resetForm();
  document.getElementById('f-title').value    = t.title;
  document.getElementById('f-desc').value     = t.desc;
  document.getElementById('f-deadline').value = t.deadline;
  document.getElementById('f-priority').value = t.priority;
  document.getElementById('f-edit-index').value = idx;
  document.getElementById('modal-tieu-de').textContent = 'Cập Nhật Công Việc';
  document.getElementById('btn-luu').textContent = 'Cập Nhật';
  bsModal.show();
}

// ── ĐỔI TRẠNG THÁI ──
function doiTrangThai(idx) {
  tasks[idx].done = !tasks[idx].done;
  saveTasks();
  renderTasks();
  updateTaskSummary();
  showMessage(tasks[idx].done ? 'Đã đánh dấu hoàn thành!' : 'Đã đánh dấu chưa xong.', 'info');
}

// ── XÓA CÔNG VIỆC ──
function xoaCongViec(idx) {
  const ten = tasks[idx].title;
  if (!confirm(`Bạn có chắc muốn xóa công việc "${ten}"?`)) return;
  tasks.splice(idx, 1);
  saveTasks();
  renderTasks();
  updateTaskSummary();
  showMessage(`Đã xóa công việc "${ten}".`, 'warning');
}

// ── SỰ KIỆN: Nút mở form thêm ──
document.getElementById('btn-mo-form').addEventListener('click', () => {
  resetForm();
  bsModal.show();
});

// ── SỰ KIỆN: Nút Lưu ──
document.getElementById('btn-luu').addEventListener('click', () => {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('Vui lòng nhập tiêu đề công việc!'); return; }

  const idx = parseInt(document.getElementById('f-edit-index').value);
  const data = getFormData();

  if (idx === -1) {
    // Thêm mới
    tasks.push(data);
    showMessage(`Đã thêm công việc "${data.title}"!`);
  } else {
    // Cập nhật — giữ nguyên trạng thái done
    data.done = tasks[idx].done;
    tasks[idx] = data;
    showMessage(`Đã cập nhật công việc "${data.title}"!`);
  }

  saveTasks();
  renderTasks();
  updateTaskSummary();
  bsModal.hide();
});

// ── KHỞI TẠO ──
loadTasks();
renderTasks();
updateTaskSummary();
</script>
</body>
</html>
