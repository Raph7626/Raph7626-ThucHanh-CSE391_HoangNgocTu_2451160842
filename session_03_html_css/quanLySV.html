<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản Lý Sinh Viên</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <header>
       <nav class="navbar navbar-expand-lg navbar-light sticky-top"
       style="background: rgb(139, 230, 230)">
        <a class="navbar-brand fs-3 fw-bold text-larger" href="#">🎓 Quản lý sinh viên</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="#khu-vuc-thong-ke">Bảng Sinh Viên</a></li>
                <li class="nav-item"><a class="nav-link" href="https://github.com/Raph7626?tab=repositories">Git</a></li>
            </ul>
        </div>
    </nav>
    </header>

<div class="container py-4">
  <div class="row mb-3" id="khu-vuc-thong-ke">
    <div class="col-auto">
      <span class="badge bg-primary fs-6">Tổng: <strong id="total-score">0</strong> sinh viên</span>
    </div>
    <div class="col-auto">
      <span class="badge bg-success fs-6">Điểm TB lớp: <strong id="average-score">—</strong></span>
    </div>
  </div>

  <!-- Thông báo -->
  <div id="thong-bao" class="alert d-none"></div>

  <!-- Nút thêm -->
  <div class="mb-3">
    <button class="btn btn-primary" id="btn-mo-form">+ Thêm Sinh Viên</button>
  </div>

  <!-- Bảng danh sách -->
  <table class="table table-bordered table-hover bg-white">
    <thead class="table-dark">
      <tr>
        <th>Mã SV</th>
        <th>Họ và Tên</th>
        <th>Ngày Sinh</th>
        <th>Lớp</th>
        <th>Điểm TB</th>
        <th>Email</th>
        <th>Thao Tác</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

</div>

<!-- Modal thêm/sửa -->
<div class="modal fade" id="modal-form" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modal-tieu-de">Thêm Sinh Viên</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="student-form" novalidate>
          <div class="mb-3">
            <label class="form-label">Mã sinh viên <span class="text-danger">*</span></label>
            <input type="text" id="f-id" class="form-control" placeholder="VD: SV001">
          </div>
          <div class="mb-3">
            <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
            <input type="text" id="f-name" class="form-control" placeholder="Nguyễn Văn A">
          </div>
          <div class="mb-3">
            <label class="form-label">Ngày sinh</label>
            <input type="date" id="f-dob" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Lớp học <span class="text-danger">*</span></label>
            <input type="text" id="f-class" class="form-control" placeholder="VD: CNTT-K47">
          </div>
          <div class="mb-3">
            <label class="form-label">Điểm trung bình <span class="text-danger">*</span></label>
            <input type="number" id="f-gpa" class="form-control" placeholder="0 - 10" step="0.1" min="0" max="10">
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" id="f-email" class="form-control" placeholder="example@email.com">
          </div>
          <input type="hidden" id="f-edit-index" value="-1">
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
        <button class="btn btn-primary" id="btn-luu">Lưu</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>

const STORAGE_KEY = 'danh_sach_sinh_vien';
let students = [];
const modalEl = document.getElementById('modal-form');
const bsModal = new bootstrap.Modal(modalEl);

// ── LOAD / SAVE localStorage ──
function loadStudents() {
  const raw = localStorage.getItem(STORAGE_KEY);
  students = raw ? JSON.parse(raw) : [
    { id:'SV001', name:'Nguyễn Thị Lan Anh', dob:'2003-05-12', cls:'CNTT-K47A', gpa:8.5, email:'lananh@email.com' },
    { id:'SV002', name:'Trần Minh Khoa',     dob:'2002-11-30', cls:'CNTT-K47A', gpa:7.2, email:'minhkhoa@email.com' },
    { id:'SV004', name:'Nguyễn Thị Lan Anh', dob:'2003-05-12', cls:'CNTT-K47A', gpa:8.6, email:'lananh@email.com' },
    { id:'SV005', name:'Nguyễn Thị Lan Anh', dob:'2003-05-12', cls:'CNTT-K47A', gpa:8.3, email:'lananh@email.com' },
    { id:'SV006', name:'Nguyễn Thị Lan Anh', dob:'2003-05-12', cls:'CNTT-K47A', gpa:8.9, email:'lananh@email.com' },
  ];
  if (!raw) saveStudents();
}

function saveStudents() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(students));
}

// ── HIỂN THỊ BẢNG ──
function renderStudents() {
  const tbody = document.getElementById('tbody');
  if (students.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">Chưa có sinh viên nào.</td></tr>';
    return;
  }
  tbody.innerHTML = students.map((s, idx) => `
    <tr>
      <td>${s.id}</td>
      <td>${s.name}</td>
      <td>${s.dob ? new Date(s.dob).toLocaleDateString('vi-VN') : '—'}</td>
      <td>${s.cls}</td>
      <td>${parseFloat(s.gpa).toFixed(1)}</td>
      <td>${s.email || '—'}</td>
      <td>
        <button class="btn btn-warning btn-sm me-1" onclick="moFormSua(${idx})">Sửa</button>
        <button class="btn btn-danger btn-sm" onclick="xoaSinhVien(${idx})">Xóa</button>
      </td>
    </tr>
  `).join('');
}

// ── THỐNG KÊ ──
function updateStatistics() {
  const total = students.length;
  const avg = total
    ? (students.reduce((sum, s) => sum + parseFloat(s.gpa), 0) / total).toFixed(2)
    : '—';
  document.getElementById('total-score').textContent = total;
  document.getElementById('average-score').textContent = avg;
}

// ── THÔNG BÁO ──
function showThongBao(msg, type = 'success') {
  const el = document.getElementById('thong-bao');
  el.className = `alert alert-${type}`;
  el.textContent = msg;
  el.classList.remove('d-none');
  setTimeout(() => el.classList.add('d-none'), 3000);
}

// ── RESET FORM ──
function resetForm() {
  ['f-id', 'f-name', 'f-dob', 'f-class', 'f-gpa', 'f-email'].forEach(id => {
    document.getElementById(id).value = '';
    document.getElementById(id).removeAttribute('readonly');
  });
  document.getElementById('f-edit-index').value = '-1';
  document.getElementById('modal-tieu-de').textContent = 'Thêm Sinh Viên';
  document.getElementById('btn-luu').textContent = 'Lưu';
}

// ── VALIDATE ──
function validate() {
  const id   = document.getElementById('f-id').value.trim();
  const name = document.getElementById('f-name').value.trim();
  const cls  = document.getElementById('f-class').value.trim();
  const gpa  = document.getElementById('f-gpa').value;
  if (!id)   { alert('Vui lòng nhập Mã sinh viên!'); return false; }
  if (!name) { alert('Vui lòng nhập Họ và tên!'); return false; }
  if (!cls)  { alert('Vui lòng nhập Lớp học!'); return false; }
  if (gpa === '' || parseFloat(gpa) < 0 || parseFloat(gpa) > 10) {
    alert('Điểm trung bình phải từ 0 đến 10!'); return false;
  }
  return true;
}

// ── LẤY DỮ LIỆU FORM ──
function getFormData() {
  return {
    id:    document.getElementById('f-id').value.trim(),
    name:  document.getElementById('f-name').value.trim(),
    dob:   document.getElementById('f-dob').value,
    cls:   document.getElementById('f-class').value.trim(),
    gpa:   parseFloat(document.getElementById('f-gpa').value),
    email: document.getElementById('f-email').value.trim(),
  };
}

// ── MỞ FORM SỬA ──
function moFormSua(idx) {
  const s = students[idx];
  resetForm();
  document.getElementById('f-id').value    = s.id;
  document.getElementById('f-name').value  = s.name;
  document.getElementById('f-dob').value   = s.dob || '';
  document.getElementById('f-class').value = s.cls;
  document.getElementById('f-gpa').value   = s.gpa;
  document.getElementById('f-email').value = s.email || '';
  document.getElementById('f-edit-index').value = idx;
  document.getElementById('f-id').setAttribute('readonly', true);
  document.getElementById('modal-tieu-de').textContent = 'Cập Nhật Sinh Viên';
  document.getElementById('btn-luu').textContent = 'Cập Nhật';
  bsModal.show();
}

// ── XÓA SINH VIÊN ──
function xoaSinhVien(idx) {
  const ten = students[idx].name;
  if (!confirm(`Bạn có chắc muốn xóa sinh viên "${ten}"?`)) return;
  students.splice(idx, 1);
  saveStudents();
  renderStudents();
  updateStatistics();
  showThongBao(`Đã xóa sinh viên "${ten}".`, 'info');
}

// ── SỰ KIỆN: Nút mở form thêm ──
document.getElementById('btn-mo-form').addEventListener('click', () => {
  resetForm();
  bsModal.show();
});

// ── SỰ KIỆN: Nút Lưu ──
document.getElementById('btn-luu').addEventListener('click', () => {
  if (!validate()) return;
  const idx = parseInt(document.getElementById('f-edit-index').value);
  const data = getFormData();

  if (idx === -1) {
    // Thêm mới
    if (students.some(s => s.id.toLowerCase() === data.id.toLowerCase())) {
      alert('Mã sinh viên đã tồn tại!'); return;
    }
    students.push(data);
    showThongBao(`Đã thêm sinh viên "${data.name}" thành công!`);
  } else {
    // Cập nhật
    students[idx] = data;
    showThongBao(`Đã cập nhật thông tin "${data.name}"!`);
  }

  saveStudents();
  renderStudents();
  updateStatistics();
  bsModal.hide();
});

// ── KHỞI TẠO ──
loadStudents();
renderStudents();
updateStatistics();
</script>
</body>
</html>
